name: Windows Build (Visual Studio 2026)
on: [push, pull_request]

jobs:
  job:
    # Use the specific VS 2026 Beta runner
    runs-on: windows-2025-vs2026 
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    
    steps:
      - uses: actions/checkout@v4

      - name: "Export GitHub Actions Cache Env"
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: "Setup vcpkg"
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat

      - name: "Confirm Compiler Version"
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\cl.exe" /?

      - name: "Run CMake & Build"
        shell: pwsh
        run: |
          # Use an absolute path for vcpkg to be safe
          $vcpkgToolchain = "${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          
          # We put this on one line to avoid backtick/space errors
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$vcpkgToolchain" -DVCPKG_TARGET_TRIPLET=x64-windows -G "Visual Studio 18 2026"
            
          cmake --build build --config Release