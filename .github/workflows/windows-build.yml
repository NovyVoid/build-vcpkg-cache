name: Windows Build (Visual Studio 2026)
on: [push, pull_request]

jobs:
  job:
    # 1. FIX: Use the specific VS 2026 image
    runs-on: windows-2025-vs2026
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    
    steps:
      - uses: actions/checkout@v4

      - name: "Export GitHub Actions Cache Environment Variables"
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: "Setup vcpkg"
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat

      - name: "Run CMake & Build"
        shell: pwsh
        run: |
          # 2. FIX: Use the full path to the toolchain file
          $VCPKG_PATH = "${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_PATH" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_INSTALL_OPTIONS="--clean-after-build"
            
          cmake --build build --config Release