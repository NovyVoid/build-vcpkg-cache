name: Windows Build (Visual Studio 2026)
on: [push, pull_request]

jobs:
  job:
    # Use the specific VS 2026 Beta runner
    runs-on: windows-2025-vs2026 
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    
    steps:
      - uses: actions/checkout@v4

      - name: "Export GitHub Actions Cache Env"
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: "Setup vcpkg"
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat

      - name: "Find Visual Studio 2026 Path"
        shell: pwsh
        run: |
          Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Depth 2 | Select-Object FullName
          # Also check the common tools folder specifically
          if (Test-Path "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\Common7\Tools") {
              ls "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\Common7\Tools"
          }

      - name: "Run CMake & Build"
        shell: pwsh
        run: |
          # 1. Use vswhere to find the actual installation path on the GitHub runner
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -version "[18.0,19.0)" -property installationPath
          
          if (-not $vsPath) {
              Write-Error "Visual Studio 2026 (v18) was not found on this runner!"
              exit 1
          }
          Write-Host "Found Visual Studio 2026 at: $vsPath"

          # 2. Dynamically locate and import the DevShell
          $modulePath = Join-Path $vsPath "Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          if (Test-Path $modulePath) {
              Import-Module $modulePath
              # Initialize for x64 architecture using the detected path
              Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64"
          } else {
              Write-Error "Could not find DevShell DLL at $modulePath"
              exit 1
          }

          # 3. Verify the compiler (Should be MSVC 19.43 or 19.50+)
          cl.exe

          # 4. Run CMake
          $VCPKG_TOOLCHAIN = "${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          
          cmake -B build -S . `
            -G "Visual Studio 18 2026" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
            
          # 5. Build
          cmake --build build --config Release