name: Windows Build (Visual Studio 2026)
on: [push, pull_request]

jobs:
  job:
    # Use the specific VS 2026 Beta runner
    runs-on: windows-2025-vs2026 
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    
    steps:
      - uses: actions/checkout@v4

      - name: "Export GitHub Actions Cache Env"
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: "Setup vcpkg"
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat

      - name: "Find Visual Studio 2026 Path"
        shell: pwsh
        run: |
          Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Depth 2 | Select-Object FullName
          # Also check the common tools folder specifically
          if (Test-Path "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\Common7\Tools") {
              ls "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\Common7\Tools"
          }

      - name: "Run CMake & Build"
        shell: pwsh
        run: |
          # 1. Initialize the VS 2026 Environment
          # This script is the "Magic Key" for VS 2026 on this runner
          Import-Module "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath "C:\Program Files\Microsoft Visual Studio\2026\Enterprise" -SkipAutomaticLocation -DevShellIndex 1
          
          # 2. Verify we are actually using VS 2026
          Write-Host "Checking Compiler Version..."
          cl.exe
          
          # 3. Run the Build
          $VCPKG_TOOLCHAIN = "${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          
          cmake -B build -S . `
            -G "Visual Studio 18 2026" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
            
          cmake --build build --config Release